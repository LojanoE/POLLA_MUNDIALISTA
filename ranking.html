<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking - Polla Mundialista 2026</title>
  <link rel="stylesheet" href="css/styles.css?v=7.0">
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <span class="trophy">🏆</span>
      <div>
        <h1>Mundial 2026</h1>
        <span>Predicciones de la Polla</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="grupos.html">🗓️ Fase Grupos</a>
      <a href="final.html">🏆 Fase Final</a>
      <a href="reglas.html">📋 Reglas</a>
      <a href="admin.html" id="nav-admin" style="display:none;">⚙️ Admin</a>
      <span id="nav-user" style="color:var(--accent); font-weight:bold;"></span>
      <button id="nav-logout" style="display:none;">🚪 Salir</button>
    </nav>
  </header>

  <div class="container">
    <h2 style="color: var(--accent); text-align: center; margin-bottom: 10px;">📊 Tabla de Posiciones</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Ranking de participantes por puntos acumulados</p>
    
    <div id="institucion-badge" class="institucion-badge" style="display:none; text-align:center; margin-bottom:15px;">
      <span>🏢</span> <span id="institucion-nombre"></span>
    </div>
    
    <!-- Tabs de instituciones (solo admin) -->
    <div id="institucion-tabs" style="display:none; margin-bottom:20px;">
      <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
        <button class="inst-tab active" data-inst="TODAS" style="padding:8px 16px; border-radius:8px; border:2px solid var(--accent); background:rgba(168,213,186,0.2); color:var(--accent); cursor:pointer; font-weight:bold;">Todas</button>
      </div>
    </div>
    
    <div id="alert-box" class="alert"></div>
    
    <div style="overflow-x: auto;">
      <table class="ranking-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Alias</th>
            <th>Pts Fase Grupos</th>
            <th>Pts Fase Final</th>
            <th>Pts Total</th>
          </tr>
        </thead>
        <tbody id="ranking-body">
          <tr><td colspan="5" style="text-align:center; padding:30px;"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px;">
    Polla Mundialista 2026 - v7.0
  </footer>

  <script type="module" src="js/ranking.js?v=7.0"></script>
</body>
</html>
