<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fase de Grupos - Polla Mundialista 2026</title>
  <link rel="stylesheet" href="css/styles.css?v=7.5">
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <span class="trophy">🏆</span>
      <div>
        <h1>Mundial 2026</h1>
        <span>Predicciones de la Polla</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="ranking.html">📊 Ranking</a>
      <a href="reglas.html">📋 Reglas</a>
      <a href="admin.html" id="nav-admin" style="display:none;">⚙️ Admin</a>
      <span id="nav-user" style="color:var(--accent); font-weight:bold;"></span>
      <button id="nav-logout" style="display:none;">🚪 Salir</button>
    </nav>
  </header>

  <div class="nav-tabs">
    <a href="grupos.html" class="nav-tab active">🗓️ Fase Grupos</a>
    <a href="final.html" class="nav-tab" id="tab-final">🏆 Fase Final</a>
  </div>

  <div class="container">
    <div id="alert-box" class="alert"></div>
    
    <div style="text-align: center; margin-bottom: 20px;">
      <h2 style="color: var(--accent); font-size: 1.3rem;">Ingresa tus predicciones para cada partido de la fase de grupos</h2>
      <div id="plazo-cerrado-msg" style="display:none; margin-top: 15px; background: rgba(244,67,54,0.15); border: 1px solid #f44336; padding: 10px 20px; border-radius: 8px; color: #f44336; font-weight: bold;">
        🔒 El plazo para ingresar predicciones de la fase de grupos ha cerrado.
      </div>
      <div id="institucion-badge" style="margin-top: 15px; display: none;">
        <span style="background: rgba(168, 213, 186, 0.2); border: 1px solid var(--accent); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; color: var(--accent); font-weight: bold;">
          🏢 <span id="institucion-nombre"></span>
        </span>
      </div>
    </div>
    
    <div id="groups-container"></div>
    
    <div style="text-align: center; margin: 40px 0;">
      <button id="btn-save" class="btn btn-primary" style="padding: 15px 50px; font-size: 1.1rem;">
        💾 Guardar Predicciones
      </button>
      <div id="save-status" style="margin-top: 15px; color: var(--text-muted);"></div>
    </div>
  </div>

  <footer style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px;">
    Polla Mundialista 2026 - v7.5
  </footer>

  <script type="module" src="js/grupos.js?v=7.5"></script>
</body>
</html>
