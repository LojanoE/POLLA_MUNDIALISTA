<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fase de Grupos - Polla Mundialista 2026</title>
  <link rel="stylesheet" href="css/styles.css?v=2.0">
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <span class="trophy">🏆</span>
      <div>
        <h1>Mundial 2026</h1>
        <span>Predicciones de la Polla</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="ranking.html">📊 Ranking</a>
      <a href="reglas.html">📋 Reglas</a>
      <a href="admin.html" id="nav-admin" style="display:none;">⚙️ Admin</a>
      <span id="nav-user" style="color:var(--accent); font-weight:bold;"></span>
      <button id="nav-logout" style="display:none;">🚪 Salir</button>
    </nav>
  </header>

  <div class="nav-tabs">
    <a href="grupos.html" class="nav-tab active">🗓️ Fase Grupos</a>

  <div class="container">
    <div id="alert-box" class="alert"></div>
    
    <div style="text-align: center; margin-bottom: 20px;">

    </div>
    
    <div id="groups-container"></div>
    
    <div style="text-align: center; margin: 40px 0;">
      <button id="btn-save" class="btn btn-primary" style="padding: 15px 50px; font-size: 1.1rem;">

      <div id="save-status" style="margin-top: 15px; color: var(--text-muted);"></div>
    </div>

  <script type="module" src="js/grupos.js?v=2.0"></script>
