<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polla Mundialista 2026 - Login</title>
  <link rel="stylesheet" href="css/styles.css?v=7.4">
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <span class="trophy">🏆</span>
      <div>
        <h1>Mundial 2026</h1>
        <span>Predicciones de la Polla</span>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="login-container">
      <h2>🌍 Ingresar a la Polla</h2>
      
      <div id="alert-box" class="alert"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="cedula">Número de Cédula</label>
          <input type="text" id="cedula" placeholder="Ej: 1234567890" required maxlength="10">
        </div>
        
        <div class="form-group">
          <label for="alias">Alias / Nombre</label>
          <input type="text" id="alias" placeholder="Tu nombre o apodo" required>
        </div>
        
        <div class="form-group">
          <label for="institucion">Institución / Departamento</label>
          <select id="institucion" class="form-control" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:var(--text-primary);" required>
            <option value="">Selecciona tu institución...</option>
          </select>
          <small style="color:var(--text-muted); font-size:0.8rem;">Carga la base de datos para ver las instituciones disponibles</small>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;">Entrar</button>
      </form>
      
      <hr style="border-color: var(--border); margin: 30px 0;">
      
      <div style="text-align: center;">
        <p style="color: var(--text-muted); margin-bottom: 15px;">¿Eres administrador?</p>
        <button id="btn-admin-login" class="btn btn-info" style="font-size: 0.85rem;">Acceso Admin</button>
      </div>
      
      <!-- Admin Login Modal (simple toggle) -->
      <div id="admin-login-form" style="display: none; margin-top: 20px;">
        <div class="form-group">
          <label for="admin-user">Usuario</label>
          <input type="text" id="admin-user" placeholder="ADMIN">
        </div>
        <div class="form-group">
          <label for="admin-pass">Contraseña</label>
          <input type="password" id="admin-pass" placeholder="••••••••">
        </div>
        <button id="btn-admin-enter" class="btn btn-success btn-block">Ingresar como Admin</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js?v=7.4';
    import { doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { setCurrentUser, ADMIN_USER, ADMIN_PASS } from './js/auth.js?v=7.4';
    
    const alertBox = document.getElementById('alert-box');
    
    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = `alert alert-${type} show`;
      setTimeout(() => alertBox.className = 'alert', 3000);
    }
    
    // Cargar instituciones disponibles
    async function cargarInstituciones() {
      try {
        const select = document.getElementById('institucion');
        const snapshot = await getDocs(collection(db, 'instituciones'));
        if (snapshot.empty) {
          select.innerHTML = '<option value="">No hay instituciones. Inicializa la BD primero.</option>';
          return;
        }
        let html = '<option value="">Selecciona tu institución...</option>';
        snapshot.forEach(d => {
          const data = d.data();
          html += `<option value="${d.id}">${data.nombre || d.id}</option>`;
        });
        select.innerHTML = html;
      } catch (err) {
        console.error(err);
      }
    }
    cargarInstituciones();
    
    // Login usuario
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cedula = document.getElementById('cedula').value.trim();
      const alias = document.getElementById('alias').value.trim();
      const institucion = document.getElementById('institucion').value;
      
      if (!cedula || !alias) {
        showAlert('Ingresa cédula y alias', 'danger');
        return;
      }
      if (!institucion) {
        showAlert('Selecciona una institución', 'danger');
        return;
      }
      
      try {
        const userId = `${cedula}_${alias}`;
        const userRef = doc(db, 'users', userId);
        const userSnap = await getDoc(userRef);
        
        if (userSnap.exists()) {
          // Usuario existente - siempre actualizar institucion_activa
          const userData = userSnap.data();
          const instituciones = userData.instituciones || [];
          const nuevasInstituciones = instituciones.includes(institucion) ? instituciones : [...instituciones, institucion];
          await setDoc(userRef, {
            instituciones: nuevasInstituciones,
            institucion_activa: institucion
          }, { merge: true });
          setCurrentUser(cedula, alias, false, institucion);
          window.location.href = 'grupos.html';
        } else {
          // Verificar cuántos aliases tiene esta cédula
          const q = query(collection(db, 'users'), where('cedula', '==', cedula));
          const existingSnap = await getDocs(q);
          
          if (existingSnap.size >= 2) {
            showAlert('Esta cédula ya tiene 2 participantes registrados (máximo permitido)', 'danger');
            return;
          }
          
          // Crear nuevo usuario
          await setDoc(userRef, {
            cedula,
            alias,
            instituciones: [institucion],
            institucion_activa: institucion,
            puntos_fase_grupos: 0,
            puntos_fase_final: 0,
            puntos_total: 0,
            creado: new Date().toISOString()
          });
          
          setCurrentUser(cedula, alias, false, institucion);
          window.location.href = 'grupos.html';
        }
        
      } catch (err) {
        console.error(err);
        showAlert('Error al conectar con la base de datos', 'danger');
      }
    });
    
    // Toggle admin form
    document.getElementById('btn-admin-login').addEventListener('click', () => {
      const form = document.getElementById('admin-login-form');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });
    
    // Admin login
    document.getElementById('btn-admin-enter').addEventListener('click', () => {
      const user = document.getElementById('admin-user').value.trim();
      const pass = document.getElementById('admin-pass').value;
      
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        setCurrentUser('ADMIN', 'Administrador', true);
        window.location.href = 'admin.html';
      } else {
        showAlert('Credenciales de admin incorrectas', 'danger');
      }
    });
  </script>

  <footer style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.8rem; margin-top: 20px;">
    v7.4
  </footer>
</body>
</html>
